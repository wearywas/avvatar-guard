<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Avvatar Guard</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main id="root">
    <header>
      <span class="wordmark">Avvatar Guard</span>
    </header>
    <section id="card">
      <div id="avvatar-slot"></div>
      <div id="domain"></div>
      <div id="status" class="status"></div>
      <div id="warning" class="warning hidden"></div>
    </section>
    <footer>
      <button id="pin-btn" class="primary" type="button">Pin as known-good</button>
    </footer>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
